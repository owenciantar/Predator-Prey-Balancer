  #sel-tower-info .tw-stats { color: #99bb99; }

  #btn-sell { color: #ffaaaa; border-color: #553322; }

<body>
<div id="top-bar">
  <span class="stat" id="lives-disp">❤️ Lives: 20</span>
  <span class="stat" id="money-disp">💰 $150</span>
  <span class="stat" id="wave-display">Wave 0/20</span>
  <button id="start-btn">START WAVE 1</button>
  <span id="status-msg"></span>
</div>
<div id="main-area">
  <div id="canvas-wrap">
    <canvas id="grid" width="720" height="480"></canvas>
    <div id="overlay">
      <h1 id="overlay-title"></h1>
      <p id="overlay-msg"></p>
      <p id="overlay-sub"></p>
      <button id="replay-btn">PLAY AGAIN</button>
    </div>
  </div>
  <div id="tower-panel">
    <div class="panel-title">TOWERS</div>
    <div id="tower-cards"></div>
    <div id="sel-tower-info" style="display:none"></div>
    <div class="hotkey-hint">Keys 1-5 to select</div>
  </div>
</div>
<script>
'use strict';

const CELL = 20;
const COLS = 36;
const ROWS = 24;
const W = COLS * CELL;
const H = ROWS * CELL;
const TICK_MS = 80;
const PI = Math.PI;

const canvas = document.getElementById('grid');
const ctx = canvas.getContext('2d');
const buf = document.createElement('canvas');
buf.width = W; buf.height = H;
const bctx = buf.getContext('2d');

// ── PATH ──────────────────────────────────────────────────────────────────────

const WAYPOINTS = [
  [0,4],[8,4],[8,12],[2,12],[2,20],[14,20],[14,14],[24,14],[24,6],[30,6],[30,20],[35,20],[35,4]
];

function buildSegments() {
  const segs = [];
  let total = 0;
  for (let i = 0; i < WAYPOINTS.length - 1; i++) {
    const [c0, r0] = WAYPOINTS[i];
    const [c1, r1] = WAYPOINTS[i + 1];
    const len = Math.abs(c1 - c0) + Math.abs(r1 - r0);
    segs.push({ c0, r0, c1, r1, len, start: total });
    total += len;
  }
  return { segs, total };
}

const { segs: SEGMENTS, total: PATH_LEN } = buildSegments();

function getPathPos(dist) {
  dist = Math.max(0, Math.min(PATH_LEN, dist));
  for (let i = 0; i < SEGMENTS.length; i++) {
    const seg = SEGMENTS[i];
    if (dist <= seg.start + seg.len || i === SEGMENTS.length - 1) {
      const t = seg.len > 0 ? (dist - seg.start) / seg.len : 0;
      const col = seg.c0 + (seg.c1 - seg.c0) * t;
      const row = seg.r0 + (seg.r1 - seg.r0) * t;
      return { x: (col + 0.5) * CELL, y: (row + 0.5) * CELL };
    }
  }
  const last = WAYPOINTS[WAYPOINTS.length - 1];
  return { x: (last[0] + 0.5) * CELL, y: (last[1] + 0.5) * CELL };
}

// PATH_CELLS: Set of r*COLS+c integers for every cell on the path
const PATH_CELLS = new Set();
for (const seg of SEGMENTS) {
  const dc = Math.sign(seg.c1 - seg.c0);
  const dr = Math.sign(seg.r1 - seg.r0);
  let c = seg.c0, r = seg.r0;
  while (true) {
    PATH_CELLS.add(r * COLS + c);
    if (c === seg.c1 && r === seg.r1) break;
    c += dc;
    r += dr;
  }
}

// ── TOWER DEFINITIONS ─────────────────────────────────────────────────────────

const TOWER_DEFS = {
  wolf:  { name:'Wolf',  cost:75,  range:2.5, damage:1,   cooldown:12, attackType:'single', color:'#6666aa', projColor:'#aaaaff', key:'1', desc:'Fast attack. Single target.' },
  bear:  { name:'Bear',  cost:150, range:2.2, damage:0.8, cooldown:20, attackType:'aoe',    color:'#886633', projColor:'#ffcc66', key:'2', desc:'AoE burst. Hits all in range.' },
  eagle: { name:'Eagle', cost:200, range:5.5, damage:3,   cooldown:28, attackType:'pierce', color:'#ccaa22', projColor:'#ffee44', key:'3', desc:'Sniper. Pierces 3 targets.' },
  skunk: { name:'Skunk', cost:100, range:2.5, damage:0,   cooldown:25, attackType:'slow',   color:'#666666', projColor:'#aaddff', key:'4', desc:'Slows 50% for 3 seconds.' },
  fox:   { name:'Fox',   cost:125, range:3,   damage:1.5, cooldown:32, attackType:'multi',  color:'#cc5511', projColor:'#ffaa44', key:'5', desc:'Hits 3 targets at once.' },
};

const UPGRADES = {
  wolf:  { name:'Razor Fangs',  cost:55,  desc:'2x damage' },
  bear:  { name:'Wide Slam',    cost:100, desc:'+50% range' },
  eagle: { name:'Eagle Eyes',   cost:140, desc:'Pierce 5 targets' },
  skunk: { name:'Potent Cloud', cost:70,  desc:'2x slow duration' },
  fox:   { name:'Pack Tactics', cost:95,  desc:'Hits 5 targets' },
};

// ── RABBIT DEFINITIONS ────────────────────────────────────────────────────────

const RABBIT_DEFS = {
  normal:  { hp:2,  speed:0.10, reward:5,  lives:1, size:1.0, color:'#c8a040', earColor:'#d8b060', label:'Rabbit'  },
  fast:    { hp:1,  speed:0.22, reward:5,  lives:1, size:0.8, color:'#ff9922', earColor:'#ffcc44', label:'Speedy'  },
  tough:   { hp:10, speed:0.07, reward:15, lives:2, size:1.2, color:'#886633', earColor:'#aa8844', label:'Tough'   },
  armored: { hp:20, speed:0.06, reward:25, lives:3, size:1.3, color:'#778866', earColor:'#99aa77', label:'Armored' },
  boss:    { hp:60, speed:0.04, reward:60, lives:5, size:1.8, color:'#cc2222', earColor:'#ee4444', label:'BOSS'    },
};

// ── WAVE DEFINITIONS ──────────────────────────────────────────────────────────

const WAVE_DEFS = [
  {groups:[[10,'normal',20]]},
  {groups:[[15,'normal',16]]},
  {groups:[[12,'normal',14],[4,'fast',10]]},
  {groups:[[10,'normal',12],[8,'fast',8]]},
  {groups:[[20,'normal',10],[5,'fast',6]]},
  {groups:[[15,'normal',10],[5,'tough',30]]},
  {groups:[[10,'fast',7],[6,'tough',22]]},
  {groups:[[18,'normal',8],[8,'fast',6],[4,'tough',18]]},
  {groups:[[10,'tough',18],[12,'fast',6]]},
  {groups:[[18,'tough',14]]},
  {groups:[[20,'normal',8],[6,'armored',35]]},
  {groups:[[12,'fast',6],[8,'tough',12],[4,'armored',28]]},
  {groups:[[15,'armored',22]]},
  {groups:[[20,'tough',12],[10,'armored',18]]},
  {groups:[[25,'fast',5],[8,'armored',15]]},
  {groups:[[22,'tough',10],[1,'boss',0]]},
  {groups:[[15,'armored',14],[2,'boss',0]]},
  {groups:[[20,'fast',5],[15,'tough',8],[2,'boss',0]]},
  {groups:[[18,'armored',10],[3,'boss',0]]},
  {groups:[[30,'armored',8],[5,'boss',0]]},
];

function buildSpawnQueue(waveDef) {
  const queue = [];
  let currentTick = 0;
  for (const [count, type, gap] of waveDef.groups) {
    for (let i = 0; i < count; i++) {
      queue.push({ tick: currentTick + i * gap, type });
    }
    currentTick += (count - 1) * gap + Math.max(gap * 2, 40);
  }
  queue.sort((a, b) => a.tick - b.tick);
  return queue;
}

// ── GAME STATE ────────────────────────────────────────────────────────────────

let grid = [];
let rabbits = [];
let projectiles = [];
let popEffects = [];
let terrain = [];
let lives = 20;
let money = 150;
let waveNum = 0;
let spawnQueue = [];
let waveTick = 0;
let tickCount = 0;
let selTool = 'wolf';
let selTower = null;
let gameState = 'idle';
let hoverCell = null;
let statusTimeoutId = null;
let totalKills = 0;

function initState() {
  grid = [];
  rabbits = [];
  projectiles = [];
  popEffects = [];
  terrain = [];
  lives = 20;
  money = 150;
  waveNum = 0;
  spawnQueue = [];
  waveTick = 0;
  tickCount = 0;
  selTool = 'wolf';
  selTower = null;
  gameState = 'idle';
  hoverCell = null;
  totalKills = 0;
  for (let r = 0; r < ROWS; r++) {
    grid.push(new Array(COLS).fill(null));
    terrain.push([]);
    for (let c = 0; c < COLS; c++) {
      terrain[r].push(Math.floor(Math.random() * 16 - 8));
    }
  }
}

// ── SIMULATION ────────────────────────────────────────────────────────────────

function spawnRabbit(type) {
  const def = RABBIT_DEFS[type];
  const pos = getPathPos(0);
  rabbits.push({
    type, hp: def.hp, maxHp: def.hp, speed: def.speed, reward: def.reward,
    lives: def.lives, size: def.size, slowTicks: 0, dist: 0,
    x: pos.x, y: pos.y, dead: false
  });
}

function dealDmg(rab, dmg) {
  rab.hp -= dmg;
  if (rab.hp <= 0 && !rab.dead) {
    rab.dead = true;
    money += rab.reward;
    totalKills++;
    popEffects.push({ x: rab.x, y: rab.y, life: 12 });
  }
}

function addProj(x0, y0, target, color) {
  projectiles.push({ x0, y0, x1: target.x, y1: target.y, color, progress: 0 });
}

function step() {
  tickCount++;

  if (gameState === 'wave') {
    while (spawnQueue.length && spawnQueue[0].tick <= waveTick) {
      const { type } = spawnQueue.shift();
      spawnRabbit(type);
    }
    waveTick++;
  }

  // Move rabbits
  for (let i = rabbits.length - 1; i >= 0; i--) {
    const rab = rabbits[i];
    if (rab.dead) continue;
    let spd = rab.speed;
    if (rab.slowTicks > 0) { spd *= 0.5; rab.slowTicks--; }
    rab.dist += spd;
    if (rab.dist >= PATH_LEN) {
      lives -= rab.lives;
      rabbits.splice(i, 1);
      if (lives <= 0) {
        lives = 0;
        endGame(false, 'The rabbits ate your carrots!');
        return;
      }
      continue;
    }
    const pos = getPathPos(rab.dist);
    rab.x = pos.x;
    rab.y = pos.y;
  }

  // Towers attack
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const tw = grid[r][c];
      if (!tw) continue;
      tw.cd = Math.max(0, tw.cd - 1);
      if (tw.cd > 0) continue;

      const tx = (c + 0.5) * CELL;
      const ty = (r + 0.5) * CELL;
      const rangePx = tw.range * CELL;
      const def = TOWER_DEFS[tw.type];

      const inRange = rabbits
        .filter(rab => !rab.dead && Math.hypot(rab.x - tx, rab.y - ty) <= rangePx)
        .sort((a, b) => b.dist - a.dist);

      if (!inRange.length) continue;

      tw.cd = tw.cooldown;
      const pc = def.projColor;
      const at = tw.attackType || def.attackType;

      switch (at) {
        case 'single':
          addProj(tx, ty, inRange[0], pc);
          dealDmg(inRange[0], tw.damage);
          break;
        case 'aoe':
          inRange.forEach(rab => { addProj(tx, ty, rab, pc); dealDmg(rab, tw.damage); });
          break;
        case 'pierce':
          inRange.slice(0, tw.pierceCnt).forEach(rab => { addProj(tx, ty, rab, pc); dealDmg(rab, tw.damage); });
          break;
        case 'slow':
          inRange[0].slowTicks = tw.slowDur;
          addProj(tx, ty, inRange[0], pc);
          break;
        case 'multi':
          inRange.slice(0, tw.multiCnt).forEach(rab => { addProj(tx, ty, rab, pc); dealDmg(rab, tw.damage); });
          break;
      }
    }
  }

  // Remove dead rabbits
  rabbits = rabbits.filter(rab => !rab.dead);

  // Update projectiles
  for (let i = projectiles.length - 1; i >= 0; i--) {
    projectiles[i].progress += 0.18;
    if (projectiles[i].progress >= 1) projectiles.splice(i, 1);
  }

  // Update pop effects
  for (let i = popEffects.length - 1; i >= 0; i--) {
    popEffects[i].life--;
    if (popEffects[i].life <= 0) popEffects.splice(i, 1);
  }

  // Check wave complete
  if (gameState === 'wave' && spawnQueue.length === 0 && rabbits.length === 0) {
    const bonus = 20 + waveNum * 5;
    money += bonus;
    if (waveNum >= WAVE_DEFS.length) {
      endGame(true);
      return;
    }
    gameState = 'between';
    setStatus('Wave ' + waveNum + ' Complete! +$' + bonus, 2500);
    updateStartBtn();
    updateUI();
  }
}

// ── GAME FLOW ─────────────────────────────────────────────────────────────────

function startWave() {
  if (gameState !== 'between' && gameState !== 'idle') return;
  if (waveNum >= WAVE_DEFS.length) return;
  waveNum++;
  spawnQueue = buildSpawnQueue(WAVE_DEFS[waveNum - 1]);
  waveTick = 0;
  gameState = 'wave';
  updateStartBtn();
  updateUI();
}

function endGame(won, reason) {
  gameState = won ? 'won' : 'lost';
  const overlay = document.getElementById('overlay');
  const titleEl = document.getElementById('overlay-title');
  const msgEl = document.getElementById('overlay-msg');
  const subEl = document.getElementById('overlay-sub');
  overlay.classList.add('show');
  if (won) {
    titleEl.textContent = 'VICTORY!';
    titleEl.className = 'win';
    msgEl.textContent = 'All 20 waves survived!';
    subEl.textContent = 'Rabbits defeated: ' + totalKills + ' | Lives remaining: ' + lives;
  } else {
    titleEl.textContent = 'DEFEATED';
    titleEl.className = 'lose';
    msgEl.textContent = reason || 'You have been defeated.';
    subEl.textContent = 'Reached wave ' + waveNum + '/20 | Rabbits defeated: ' + totalKills;
  }
  updateStartBtn();
}

function updateStartBtn() {
  const btn = document.getElementById('start-btn');
  if (gameState === 'wave') {
    btn.textContent = 'WAVE ' + waveNum + ' IN PROGRESS...';
    btn.disabled = true;
  } else if (gameState === 'won' || gameState === 'lost') {
    btn.textContent = 'GAME OVER';
    btn.disabled = true;
  } else {
    btn.textContent = 'START WAVE ' + (waveNum + 1);
    btn.disabled = false;
  }
}

function updateUI() {
  const livesEl = document.getElementById('lives-disp');
  livesEl.textContent = '\u2764\uFE0F Lives: ' + lives;
  livesEl.className = 'stat' + (lives <= 5 ? ' danger' : '');

  const moneyEl = document.getElementById('money-disp');
  const minCost = Math.min(...Object.values(TOWER_DEFS).map(d => d.cost));
  moneyEl.textContent = '\uD83D\uDCB0 $' + money;
  moneyEl.className = 'stat' + (money < minCost ? ' low' : '');

  document.getElementById('wave-display').textContent = 'Wave ' + waveNum + '/20';

  for (const [type, def] of Object.entries(TOWER_DEFS)) {
    const card = document.getElementById('card-' + type);
    if (card) {
      card.classList.toggle('disabled', money < def.cost);
      card.classList.toggle('selected', selTool === type && !selTower);
    }
  }
}

function setStatus(msg, duration) {
  document.getElementById('status-msg').textContent = msg;
  if (statusTimeoutId) clearTimeout(statusTimeoutId);
  if (duration) {
    statusTimeoutId = setTimeout(() => {
      document.getElementById('status-msg').textContent = '';
    }, duration);
  }
}

// ── SPRITE DRAWING ────────────────────────────────────────────────────────────

function drawWolf(c, x, y) {
  c.save();
  c.translate(x, y);
  c.fillStyle = '#445588';
  c.beginPath(); c.arc(10, 10, 8, 0, PI * 2); c.fill();
  c.strokeStyle = '#6666aa'; c.lineWidth = 1;
  c.beginPath(); c.arc(10, 10, 8, 0, PI * 2); c.stroke();
  c.fillStyle = '#6666aa';
  c.beginPath(); c.moveTo(2, 7); c.lineTo(5, 0); c.lineTo(9, 6); c.closePath(); c.fill();
  c.beginPath(); c.moveTo(11, 6); c.lineTo(15, 0); c.lineTo(18, 7); c.closePath(); c.fill();
  c.fillStyle = '#ffcc00';
  c.fillRect(5, 7, 3, 3);
  c.fillRect(12, 7, 3, 3);
  c.fillStyle = '#9999bb';
  c.beginPath(); c.ellipse(10, 13, 3, 2, 0, 0, PI * 2); c.fill();
  c.fillStyle = '#222244';
  c.beginPath(); c.arc(10, 11, 1.5, 0, PI * 2); c.fill();
  c.restore();
}

function drawBear(c, x, y) {
  c.save();
  c.translate(x, y);
  c.fillStyle = '#664422';
  c.beginPath(); c.arc(10, 10, 8, 0, PI * 2); c.fill();
  c.fillStyle = '#886633';
  c.beginPath(); c.arc(10, 11, 7, 0, PI * 2); c.fill();
  c.beginPath(); c.arc(4, 4, 3, 0, PI * 2); c.fill();
  c.beginPath(); c.arc(16, 4, 3, 0, PI * 2); c.fill();
  c.fillStyle = '#aa8844';
  c.beginPath(); c.ellipse(10, 13, 4, 3, 0, 0, PI * 2); c.fill();
  c.fillStyle = '#1a0a00';
  c.fillRect(6, 7, 3, 3);
  c.fillRect(11, 7, 3, 3);
  c.fillStyle = '#331100';
  c.beginPath(); c.arc(10, 12, 1.5, 0, PI * 2); c.fill();
  c.strokeStyle = '#551100'; c.lineWidth = 1;
  c.beginPath(); c.moveTo(7, 17); c.lineTo(6, 19); c.stroke();
  c.beginPath(); c.moveTo(10, 17); c.lineTo(10, 19); c.stroke();
  c.beginPath(); c.moveTo(13, 17); c.lineTo(14, 19); c.stroke();
  c.restore();
}

function drawEagle(c, x, y) {
  c.save();
  c.translate(x, y);
  c.fillStyle = '#887722';
  c.beginPath(); c.arc(10, 10, 8, 0, PI * 2); c.fill();
  c.fillStyle = '#ccaa22';
  c.beginPath(); c.moveTo(5, 10); c.bezierCurveTo(0, 6, 0, 14, 5, 13); c.closePath(); c.fill();
  c.beginPath(); c.moveTo(15, 10); c.bezierCurveTo(20, 6, 20, 14, 15, 13); c.closePath(); c.fill();
  c.beginPath(); c.ellipse(10, 12, 5, 6, 0, 0, PI * 2); c.fill();
  c.beginPath(); c.arc(10, 6, 4, 0, PI * 2); c.fill();
  c.fillStyle = '#ff8800';
  c.beginPath(); c.moveTo(8, 7); c.lineTo(12, 7); c.lineTo(10, 11); c.closePath(); c.fill();
  c.fillStyle = '#ffee00';
  c.beginPath(); c.arc(8, 5, 1.5, 0, PI * 2); c.fill();
  c.beginPath(); c.arc(12, 5, 1.5, 0, PI * 2); c.fill();
  c.restore();
}

function drawSkunk(c, x, y) {
  c.save();
  c.translate(x, y);
  c.fillStyle = '#333333';
  c.beginPath(); c.arc(10, 10, 8, 0, PI * 2); c.fill();
  c.fillStyle = '#111111';
  c.beginPath(); c.ellipse(10, 12, 6, 7, 0, 0, PI * 2); c.fill();
  c.fillStyle = '#eeeeee';
  c.fillRect(9, 4, 2, 14);
  c.fillStyle = '#111111';
  c.beginPath(); c.arc(10, 5, 4, 0, PI * 2); c.fill();
  c.fillStyle = '#eeeeee';
  c.fillRect(9, 2, 2, 5);
  c.fillStyle = '#ff2222';
  c.fillRect(7, 4, 2, 2);
  c.fillRect(11, 4, 2, 2);
  c.fillStyle = '#111111';
  c.beginPath(); c.arc(16, 3, 5, PI, PI * 2); c.fill();
  c.fillStyle = '#eeeeee';
  c.beginPath(); c.arc(16, 3, 4, PI, PI * 2); c.fill();
  c.restore();
}

function drawFox(c, x, y) {
  c.save();
  c.translate(x, y);
  c.fillStyle = '#992200';
  c.beginPath(); c.arc(10, 10, 8, 0, PI * 2); c.fill();
  c.fillStyle = '#cc5511';
  c.beginPath(); c.moveTo(2, 8); c.lineTo(6, 0); c.lineTo(10, 7); c.closePath(); c.fill();
  c.beginPath(); c.moveTo(10, 7); c.lineTo(14, 0); c.lineTo(18, 8); c.closePath(); c.fill();
  c.fillStyle = '#ee8844';
  c.beginPath(); c.moveTo(4, 7); c.lineTo(6, 2); c.lineTo(9, 7); c.closePath(); c.fill();
  c.beginPath(); c.moveTo(11, 7); c.lineTo(14, 2); c.lineTo(16, 7); c.closePath(); c.fill();
  c.fillStyle = '#cc5511';
  c.beginPath(); c.ellipse(10, 13, 6, 6, 0, 0, PI * 2); c.fill();
  c.beginPath(); c.arc(10, 10, 5, 0, PI * 2); c.fill();
  c.fillStyle = '#ffee00';
  c.fillRect(6, 8, 3, 3);
  c.fillRect(11, 8, 3, 3);
  c.fillStyle = '#ffddbb';
  c.beginPath(); c.ellipse(10, 13, 3, 2, 0, 0, PI * 2); c.fill();
  c.fillStyle = '#331100';
  c.beginPath(); c.arc(10, 12, 1, 0, PI * 2); c.fill();
  c.restore();
}

const SPRITE_DRAW = { wolf: drawWolf, bear: drawBear, eagle: drawEagle, skunk: drawSkunk, fox: drawFox };

function drawTower(c, x, y, tw) {
  SPRITE_DRAW[tw.type](c, x, y);
  if (tw.level === 2) {
    c.fillStyle = '#ffcc00';
    c.font = '9px monospace';
    c.textAlign = 'left';
    c.fillText('\u2605', x + 12, y + 8);
  }
  if (tw.cd > 0) {
    c.strokeStyle = 'rgba(0,0,0,0.6)';
    c.lineWidth = 3;
    c.beginPath();
    c.arc(x + 10, y + 10, 8, -PI / 2, -PI / 2 + (tw.cd / tw.cooldown) * PI * 2);
    c.stroke();
  }
}

// ── RABBIT SPRITES ────────────────────────────────────────────────────────────

function drawRabbitSprite(c, rab) {
  const def = RABBIT_DEFS[rab.type];
  const s = def.size;
  const R = 7 * s;

  if (rab.slowTicks > 0) {
    c.fillStyle = 'rgba(100,160,255,0.3)';
    c.beginPath(); c.arc(0, 0, R + 4, 0, PI * 2); c.fill();
  }

  c.fillStyle = def.color;
  c.fillRect(-R * 0.6 - 2, -R * 1.4, R * 0.45, R);
  c.fillRect(R * 0.2 - 2,  -R * 1.4, R * 0.45, R);
  c.fillStyle = '#e8a0a0';
  c.fillRect(-R * 0.6 - 1, -R * 1.35, R * 0.3, R * 0.85);
  c.fillRect(R * 0.2 - 1,  -R * 1.35, R * 0.3, R * 0.85);

  c.fillStyle = def.color;
  c.beginPath(); c.arc(0, 0, R, 0, PI * 2); c.fill();

  c.fillStyle = '#1a0a00';
  c.fillRect(-R * 0.45, -R * 0.3, R * 0.35, R * 0.35);
  c.fillRect( R * 0.1,  -R * 0.3, R * 0.35, R * 0.35);
  c.fillStyle = '#ffffff';
  c.fillRect(-R * 0.4,  -R * 0.3, R * 0.15, R * 0.15);
  c.fillRect( R * 0.15, -R * 0.3, R * 0.15, R * 0.15);

  c.fillStyle = '#cc7070';
  c.beginPath(); c.arc(0, R * 0.35, R * 0.2, 0, PI * 2); c.fill();

  c.fillStyle = '#f0e8d0';
  c.beginPath(); c.arc(R * 0.9, R * 0.2, R * 0.3, 0, PI * 2); c.fill();

  if (rab.maxHp > 2) {
    const bw = R * 2.5, bh = 4;
    const bx = -R * 1.25, by = R + 4;
    c.fillStyle = '#333';
    c.fillRect(bx, by, bw, bh);
    const frac = Math.max(0, rab.hp / rab.maxHp);
    c.fillStyle = frac > 0.5 ? '#55cc55' : frac > 0.25 ? '#ffaa00' : '#ff4444';
    c.fillRect(bx, by, bw * frac, bh);
  }

  if (rab.type === 'boss') {
    c.fillStyle = '#ff6666';
    c.font = 'bold 8px monospace';
    c.textAlign = 'center';
    c.fillText('BOSS', 0, -R * 1.8);
  }
}

// ── PATH ARROWS ───────────────────────────────────────────────────────────────

function drawPathArrows() {
  bctx.fillStyle = 'rgba(180,140,60,0.5)';
  for (let d = 2; d < PATH_LEN - 1; d += 5) {
    const p0 = getPathPos(d);
    const p1 = getPathPos(d + 0.5);
    const angle = Math.atan2(p1.y - p0.y, p1.x - p0.x);
    const size = 4;
    bctx.save();
    bctx.translate(p0.x, p0.y);
    bctx.rotate(angle);
    bctx.beginPath();
    bctx.moveTo(size, 0);
    bctx.lineTo(-size * 0.6, -size * 0.5);
    bctx.lineTo(-size * 0.6,  size * 0.5);
    bctx.closePath();
    bctx.fill();
    bctx.restore();
  }
}

// ── SPAWN PORTAL ──────────────────────────────────────────────────────────────

function drawSpawnPortal() {
  const [c0, r0] = WAYPOINTS[0];
  const x = (c0 + 0.5) * CELL;
  const y = (r0 + 0.5) * CELL;
  const pulse = 0.4 + 0.3 * Math.sin(tickCount * 0.08);
  bctx.fillStyle = 'rgba(0,200,0,' + (pulse * 0.4) + ')';
  bctx.beginPath(); bctx.arc(x, y, 10, 0, PI * 2); bctx.fill();
  bctx.strokeStyle = 'rgba(0,255,0,' + pulse + ')';
  bctx.lineWidth = 2;
  bctx.beginPath();
  bctx.arc(x, y, 10 + 2 * Math.sin(tickCount * 0.08), 0, PI * 2);
  bctx.stroke();
}

// ── CARROT ────────────────────────────────────────────────────────────────────

function drawCarrot() {
  const [cw, rw] = WAYPOINTS[WAYPOINTS.length - 1];
  const x = cw * CELL;
  const y = rw * CELL;
  bctx.fillStyle = '#ff8800';
  bctx.beginPath();
  bctx.moveTo(x + 4,  y + 3);
  bctx.lineTo(x + 16, y + 3);
  bctx.lineTo(x + 10, y + 17);
  bctx.closePath();
  bctx.fill();
  bctx.fillStyle = '#dd6600';
  bctx.beginPath();
  bctx.moveTo(x + 8,  y + 12);
  bctx.lineTo(x + 12, y + 12);
  bctx.lineTo(x + 10, y + 17);
  bctx.closePath();
  bctx.fill();
  bctx.fillStyle = '#228822';
  bctx.beginPath(); bctx.ellipse(x + 7,  y + 3, 4, 2, -0.5, 0, PI); bctx.fill();
  bctx.beginPath(); bctx.ellipse(x + 13, y + 3, 4, 2,  0.5, 0, PI); bctx.fill();
  bctx.beginPath(); bctx.ellipse(x + 10, y + 1, 2, 4,  0,   0, PI); bctx.fill();
}

// ── RANGE CIRCLE ──────────────────────────────────────────────────────────────

function drawRangeCircle(col, row, range, style) {
  const cx = (col + 0.5) * CELL;
  const cy = (row + 0.5) * CELL;
  bctx.fillStyle = style.replace(/[\d.]+\)$/, '0.07)');
  bctx.beginPath(); bctx.arc(cx, cy, range * CELL, 0, PI * 2); bctx.fill();
  bctx.strokeStyle = style;
  bctx.lineWidth = 1.5;
  bctx.setLineDash([5, 4]);
  bctx.beginPath(); bctx.arc(cx, cy, range * CELL, 0, PI * 2); bctx.stroke();
  bctx.setLineDash([]);
}

// ── RENDER ────────────────────────────────────────────────────────────────────

function render() {
  bctx.fillStyle = '#0a160a';
  bctx.fillRect(0, 0, W, H);

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const t = terrain[r][c];
      if (PATH_CELLS.has(r * COLS + c)) {
        bctx.fillStyle = 'rgb(' + (100 + t) + ',' + (70 + t) + ',' + (30 + t) + ')';
      } else {
        bctx.fillStyle = 'rgb(' + (12 + t) + ',' + (25 + t) + ',' + (12 + t) + ')';
      }
      bctx.fillRect(c * CELL, r * CELL, CELL, CELL);
    }
  }

  drawPathArrows();
  drawSpawnPortal();
  drawCarrot();

  if (selTower) {
    const tw = grid[selTower.r][selTower.c];
    if (tw) drawRangeCircle(selTower.c, selTower.r, tw.range, 'rgba(200,200,100,0.4)');
  } else if (hoverCell) {
    const { r, c } = hoverCell;
    if (!PATH_CELLS.has(r * COLS + c) && !grid[r][c]) {
      const def = TOWER_DEFS[selTool];
      drawRangeCircle(c, r, def.range, 'rgba(150,150,255,0.35)');
    }
  }

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c]) drawTower(bctx, c * CELL, r * CELL, grid[r][c]);
    }
  }

  if (selTower) {
    bctx.strokeStyle = '#ffcc00';
    bctx.lineWidth = 2;
    bctx.strokeRect(selTower.c * CELL + 1, selTower.r * CELL + 1, CELL - 2, CELL - 2);
  }

  for (const fx of popEffects) {
    const prog = 1 - fx.life / 12;
    bctx.strokeStyle = 'rgba(255,220,50,' + (fx.life / 12) + ')';
    bctx.lineWidth = 2;
    bctx.beginPath();
    bctx.arc(fx.x, fx.y, prog * 18 + 4, 0, PI * 2);
    bctx.stroke();
  }

  for (const p of projectiles) {
    const px = p.x0 + (p.x1 - p.x0) * p.progress;
    const py = p.y0 + (p.y1 - p.y0) * p.progress;
    bctx.fillStyle = p.color;
    bctx.beginPath();
    bctx.arc(px, py, 3, 0, PI * 2);
    bctx.fill();
  }

  for (const rab of rabbits) {
    bctx.save();
    bctx.translate(rab.x, rab.y);
    drawRabbitSprite(bctx, rab);
    bctx.restore();
  }

  ctx.drawImage(buf, 0, 0);
}

// ── TOWER PANEL ───────────────────────────────────────────────────────────────

function buildTowerCards() {
  const container = document.getElementById('tower-cards');
  container.innerHTML = '';
  for (const [type, def] of Object.entries(TOWER_DEFS)) {
    const card = document.createElement('div');
    card.className = 'tower-card';
    card.id = 'card-' + type;
    card.onclick = () => { if (money >= def.cost || true) setTool(type); };

    const header = document.createElement('div');
    header.className = 'card-header';

    const iconCanvas = document.createElement('canvas');
    iconCanvas.className = 'card-icon';
    iconCanvas.width = 28;
    iconCanvas.height = 28;
    const ic = iconCanvas.getContext('2d');
    ic.save();
    ic.scale(28 / 20, 28 / 20);
    SPRITE_DRAW[type](ic, 0, 0);
    ic.restore();

    const nameSpan = document.createElement('span');
    nameSpan.className = 'card-name';
    nameSpan.textContent = def.name + ' [' + def.key + ']';

    const costSpan = document.createElement('span');
    costSpan.className = 'card-cost';
    costSpan.textContent = '$' + def.cost;

    header.appendChild(iconCanvas);
    header.appendChild(nameSpan);
    header.appendChild(costSpan);

    const descDiv = document.createElement('div');
    descDiv.className = 'card-desc';
    descDiv.textContent = def.desc;

    card.appendChild(header);
    card.appendChild(descDiv);
    container.appendChild(card);
  }
}

function setTool(type) {
  selTool = type;
  selTower = null;
  updateTowerPanel();
  updateUI();
}

function updateTowerPanel() {
  const cardsDiv = document.getElementById('tower-cards');
  const infoDiv = document.getElementById('sel-tower-info');

  if (selTower) {
    const tw = grid[selTower.r][selTower.c];
    if (!tw) {
      selTower = null;
      cardsDiv.style.display = 'flex';
      infoDiv.style.display = 'none';
      return;
    }
    cardsDiv.style.display = 'none';
    infoDiv.style.display = 'flex';

    const def = TOWER_DEFS[tw.type];
    const upg = UPGRADES[tw.type];
    const sellPrice = Math.floor(tw.totalCost * 0.7);
    const canUpgrade = tw.level < 2 && money >= upg.cost;

    infoDiv.innerHTML = '';

    const titleDiv = document.createElement('div');
    titleDiv.className = 'tw-title';
    titleDiv.textContent = def.name + '  Lv.' + tw.level;
    infoDiv.appendChild(titleDiv);

    const statsDiv = document.createElement('div');
    statsDiv.className = 'tw-stats';
    statsDiv.textContent = 'Dmg: ' + tw.damage + ' | Range: ' + tw.range.toFixed(1);
    infoDiv.appendChild(statsDiv);

    const statsDiv2 = document.createElement('div');
    statsDiv2.className = 'tw-stats';
    statsDiv2.textContent = 'Type: ' + def.attackType;
    infoDiv.appendChild(statsDiv2);

    const hr = document.createElement('hr');
    infoDiv.appendChild(hr);

    const upgBtn = document.createElement('button');
    upgBtn.id = 'btn-upgrade';
    upgBtn.disabled = !canUpgrade;
    upgBtn.innerHTML = 'Upgrade: $' + upg.cost + '<br>' + upg.name + ' - ' + upg.desc;
    upgBtn.onclick = () => {
      const t2 = grid[selTower.r][selTower.c];
      if (!t2 || t2.level >= 2 || money < upg.cost) return;
      money -= upg.cost;
      t2.totalCost += upg.cost;
      t2.level = 2;
      applyUpgrade(t2);
      updateTowerPanel();
      updateUI();
    };
    infoDiv.appendChild(upgBtn);

    const sellBtn = document.createElement('button');
    sellBtn.id = 'btn-sell';
    sellBtn.textContent = 'Sell ($' + sellPrice + ')';
    sellBtn.onclick = () => {
      const t2 = grid[selTower.r][selTower.c];
      if (!t2) return;
      money += Math.floor(t2.totalCost * 0.7);
      grid[selTower.r][selTower.c] = null;
      selTower = null;
      updateTowerPanel();
      updateUI();
    };
    infoDiv.appendChild(sellBtn);

    const deselBtn = document.createElement('button');
    deselBtn.id = 'btn-desel';
    deselBtn.textContent = '\u2715 Deselect';
    deselBtn.onclick = () => {
      selTower = null;
      updateTowerPanel();
      updateUI();
    };
    infoDiv.appendChild(deselBtn);
  } else {
    cardsDiv.style.display = 'flex';
    infoDiv.style.display = 'none';
  }
}

function applyUpgrade(tw) {
  switch (tw.type) {
    case 'wolf':  tw.damage   *= 2;   break;
    case 'bear':  tw.range    *= 1.5; break;
    case 'eagle': tw.pierceCnt = 5;   break;
    case 'skunk': tw.slowDur   = 120; break;
    case 'fox':   tw.multiCnt  = 5;   break;
  }
}

// ── INPUT ─────────────────────────────────────────────────────────────────────

function canvasCoords(e) {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  return { r: Math.floor(y / CELL), c: Math.floor(x / CELL) };
}

canvas.addEventListener('click', e => {
  if (gameState === 'lost' || gameState === 'won') return;
  const { r, c } = canvasCoords(e);
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;

  if (grid[r][c]) {
    selTower = { r, c };
    updateTowerPanel();
    updateUI();
    return;
  }

  if (PATH_CELLS.has(r * COLS + c)) return;
  selTower = null;

  const def = TOWER_DEFS[selTool];
  if (money < def.cost) return;

  money -= def.cost;
  grid[r][c] = {
    type: selTool,
    level: 1,
    cd: 0,
    damage: def.damage,
    range: def.range,
    cooldown: def.cooldown,
    pierceCnt: 3,
    multiCnt: 3,
    slowDur: 60,
    attackType: def.attackType,
    totalCost: def.cost
  };

  updateTowerPanel();
  updateUI();
});

canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  if (gameState === 'lost' || gameState === 'won') return;
  const { r, c } = canvasCoords(e);
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
  const tw = grid[r][c];
  if (!tw) return;
  money += Math.floor(tw.totalCost * 0.7);
  grid[r][c] = null;
  if (selTower && selTower.r === r && selTower.c === c) {
    selTower = null;
    updateTowerPanel();
  }
  updateUI();
});

canvas.addEventListener('mousemove', e => {
  const { r, c } = canvasCoords(e);
  if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
    hoverCell = { r, c };
  } else {
    hoverCell = null;
  }
});

canvas.addEventListener('mouseleave', () => { hoverCell = null; });

document.addEventListener('keydown', e => {
  const keyMap = { '1': 'wolf', '2': 'bear', '3': 'eagle', '4': 'skunk', '5': 'fox' };
  if (keyMap[e.key]) {
    setTool(keyMap[e.key]);
  }
});

document.getElementById('start-btn').addEventListener('click', startWave);

document.getElementById('replay-btn').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('show');
  initState();
  buildTowerCards();
  updateTowerPanel();
  updateStartBtn();
  updateUI();
});

// ── GAME LOOP ─────────────────────────────────────────────────────────────────

let lastTime = 0;
let accumulator = 0;

function loop(timestamp) {
  requestAnimationFrame(loop);
  const dt = Math.min(timestamp - lastTime, 200);
  lastTime = timestamp;

  if (gameState !== 'lost' && gameState !== 'won') {
    accumulator += dt;
    while (accumulator >= TICK_MS) {
      accumulator -= TICK_MS;
      step();
      if (gameState === 'lost' || gameState === 'won') break;
    }
    updateUI();
    updateStartBtn();
  }

  render();
}

// ── INIT ──────────────────────────────────────────────────────────────────────

initState();
buildTowerCards();
updateTowerPanel();
updateStartBtn();
updateUI();
requestAnimationFrame(loop);
</script>
